hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath:
  - file://verl/verl/trainer/config
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - data.train_files=data/gsm8k/train.parquet
    - data.val_files=data/gsm8k/train.parquet
    - data.train_batch_size=0
    - data.gen_batch_size=1
    - data.return_raw_chat=True
    - +ray_kwargs.ray_init.runtime_env.env_vars.VLLM_USE_V1="1"
    - data.shuffle=False
    - data.max_response_length=4096
    - actor_rollout_ref.model.path=Qwen/Qwen2.5-0.5B-Instruct
    - algorithm.adv_estimator=grpo
    - actor_rollout_ref.rollout.n=4
    - actor_rollout_ref.rollout.tensor_model_parallel_size=1
    - actor_rollout_ref.rollout.pipeline_model_parallel_size=1
    - actor_rollout_ref.rollout.data_parallel_size=1
    - actor_rollout_ref.hybrid_engine=False
    - actor_rollout_ref.actor.use_dynamic_bsz=true
    - actor_rollout_ref.ref.log_prob_use_dynamic_bsz=true
    - actor_rollout_ref.rollout.log_prob_use_dynamic_bsz=true
    - actor_rollout_ref.rollout.name=vllm
    - actor_rollout_ref.rollout.mode=async
    - actor_rollout_ref.rollout.calculate_log_probs=True
    - trainer.project_name=comparision_0205
    - trainer.experiment_name=gsm8k_side_A
    - trainer.test_freq=1000
    - trainer.logger=[console]
    - trainer.nnodes=1
    - trainer.n_gpus_per_node=1
    - rollout.nnodes=1
    - rollout.n_gpus_per_node=1
    - rollout.total_rollout_steps=64000
    - async_training.require_batches=1
    - async_training.staleness_threshold=0
    - async_training.trigger_parameter_sync_step=1
    - async_training.partial_rollout=false
    - +exchange.side=A
    - +exchange.mode=both
    - +exchange.run_id=1773799729052288434
    - +exchange.backend=tcp
    - +exchange.host=127.0.0.1
    - +exchange.port=18080
    - actor_rollout_ref.rollout.gpu_memory_utilization=0.5
    - actor_rollout_ref.rollout.response_length=4096
    - actor_rollout_ref.rollout.max_num_batched_tokens=16384
    - actor_rollout_ref.rollout.max_model_len=8192
    - actor_rollout_ref.actor.ppo_mini_batch_size=32
  job:
    name: fully_async_exchange_main
    chdir: null
    override_dirname: +exchange.backend=tcp,+exchange.host=127.0.0.1,+exchange.mode=both,+exchange.port=18080,+exchange.run_id=1773799729052288434,+exchange.side=A,+ray_kwargs.ray_init.runtime_env.env_vars.VLLM_USE_V1="1",actor_rollout_ref.actor.ppo_mini_batch_size=32,actor_rollout_ref.actor.use_dynamic_bsz=true,actor_rollout_ref.hybrid_engine=False,actor_rollout_ref.model.path=Qwen/Qwen2.5-0.5B-Instruct,actor_rollout_ref.ref.log_prob_use_dynamic_bsz=true,actor_rollout_ref.rollout.calculate_log_probs=True,actor_rollout_ref.rollout.data_parallel_size=1,actor_rollout_ref.rollout.gpu_memory_utilization=0.5,actor_rollout_ref.rollout.log_prob_use_dynamic_bsz=true,actor_rollout_ref.rollout.max_model_len=8192,actor_rollout_ref.rollout.max_num_batched_tokens=16384,actor_rollout_ref.rollout.mode=async,actor_rollout_ref.rollout.n=4,actor_rollout_ref.rollout.name=vllm,actor_rollout_ref.rollout.pipeline_model_parallel_size=1,actor_rollout_ref.rollout.response_length=4096,actor_rollout_ref.rollout.tensor_model_parallel_size=1,algorithm.adv_estimator=grpo,async_training.partial_rollout=false,async_training.require_batches=1,async_training.staleness_threshold=0,async_training.trigger_parameter_sync_step=1,data.gen_batch_size=1,data.max_response_length=4096,data.return_raw_chat=True,data.shuffle=False,data.train_batch_size=0,data.train_files=data/gsm8k/train.parquet,data.val_files=data/gsm8k/train.parquet,rollout.n_gpus_per_node=1,rollout.nnodes=1,rollout.total_rollout_steps=64000,trainer.experiment_name=gsm8k_side_A,trainer.logger=[console],trainer.n_gpus_per_node=1,trainer.nnodes=1,trainer.project_name=comparision_0205,trainer.test_freq=1000
    id: ???
    num: ???
    config_name: fully_async_ppo_trainer
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /zhangshihao/weitong/verl_swap
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /zhangshihao/weitong/verl_swap/verl/verl/experimental/fully_async_policy/config
      schema: file
      provider: main
    - path: verl/verl/trainer/config
      schema: file
      provider: hydra.searchpath in main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /zhangshihao/weitong/verl_swap/outputs/2026-03-18/08-19-11
    choices:
      algorithm@algorithm.rollout_correction: rollout_correction
      reward: reward
      model@actor_rollout_ref.model: hf_model
      rollout@actor_rollout_ref.rollout: rollout
      data: legacy_data
      model_engine: dp
      critic: dp_critic
      critic/../engine@critic.model.fsdp_config: fsdp
      critic/../optim@critic.optim: fsdp
      ref@actor_rollout_ref.ref: dp_ref
      ref/../engine@actor_rollout_ref.ref.fsdp_config: fsdp
      actor@actor_rollout_ref.actor: dp_actor
      actor/../engine@actor_rollout_ref.actor.fsdp_config: fsdp
      actor/../optim@actor_rollout_ref.actor.optim: fsdp
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
erbose: false
